name = "durwesh-perfume-store"
main = "functions/_middleware.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "durwesh-perfume-store"

[[env.production.d1_databases]]
binding = "DB"
database_name = "perfume-db"
database_id = "your-production-database-id"

[env.development]
name = "durwesh-perfume-store-dev"

[[env.development.d1_databases]]
binding = "DB"
database_name = "perfume-db-dev"
database_id = "your-development-database-id"

# Pages configuration
[build]
command = "npm run build"
cwd = "."
watch_dir = "src"

[build.upload]
format = "modules"