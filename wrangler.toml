name = "durwesh254"
main = "functions/_middleware.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"
cwd = "."
watch_dir = "src"

[build.upload]
format = "modules"

[env.production]
name = "durwesh254"

[[env.production.d1_databases]]
binding = "durwesh-db"
database_name = "durwesh-db"
database_id = "c5d9b184-af24-4cf1-a388-a96b45b60776"

[env.development]
name = "durwesh254-dev"

[[env.development.d1_databases]]
binding = "durwesh-db"
database_name = "durwesh-db"
database_id = "c5d9b184-af24-4cf1-a388-a96b45b60776"
